# Therasync Pipeline Configuration
# Configuration for physiological data preprocessing and analysis

# Study Configuration
study:
  name: "therasync"
  version: "1.0.0"
  description: "Family therapy session physiological analysis"

# Data paths and BIDS structure
paths:
  rawdata: "data/raw"
  derivatives: "data/derivatives"
  logs: "log"

# Output structure for preprocessing derivatives
output:
  # Base directory structure: derivatives/preprocessing/sub-xxx/ses-yyy/{modality}/
  preprocessing_dir: "preprocessing"  # derivatives/preprocessing/
  modality_subdirs:
    bvp: "bvp"     # derivatives/preprocessing/sub-xxx/ses-yyy/bvp/
    eda: "eda"     # derivatives/preprocessing/sub-xxx/ses-yyy/eda/
    hr: "hr"       # derivatives/preprocessing/sub-xxx/ses-yyy/hr/
    temp: "temp"   # derivatives/preprocessing/sub-xxx/ses-yyy/temp/
  
  # Alliance/MOI annotations output structure
  alliance_dir: "alliance"  # derivatives/alliance/
  alliance_subdirs:
    annotations: "annotations"  # derivatives/alliance/sub-gXXshared/ses-YY/annotations/
    figures: "figures"  # derivatives/alliance/sub-gXXshared/ses-YY/figures/
  
# Moment/Task definitions - flexible for different study designs
moments:
  # Current study has 2 moments
  - name: "restingstate"
    displayname: "Resting State"
    description: "Baseline resting state recording (~1 minute)"
    duration_expected: 60  # seconds, approximate
  - name: "therapy"
    displayname: "Therapy Session"
    description: "Therapeutic session recording (40-120 minutes)"
    duration_expected: 3600  # seconds, approximate
  
  # Example for future 5-moment study:
  # - name: "baseline"
  # - name: "task1"
  # - name: "break"
  # - name: "task2"
  # - name: "recovery"

# Physiological data processing parameters
physio:
  # BVP (Blood Volume Pulse) processing
  bvp:
    sampling_rate: 64  # Hz, from Empatica E4
    processing:
      method: "elgendi"  # Peak detection method for nk.ppg_process
      method_quality: "templatematch"  # Quality assessment method
      lowcut_freq: 0.5   # Hz - for additional filtering if needed
      highcut_freq: 8.0  # Hz - for additional filtering if needed
      quality_threshold: 0.8  # Warning threshold for peak quality (0-1 scale)
                              # Note: Longer recordings (>30 min) often have lower scores (0.65-0.75) but remain usable
      min_duration: 10       # seconds - minimum signal duration for meaningful analysis
    
    # RR Intervals extraction configuration
    rr_intervals:
      enabled: true           # Extract and save RR intervals to file
      min_valid_ms: 300       # Minimum valid RR interval (ms) - corresponds to ~200 BPM max
      max_valid_ms: 2000      # Maximum valid RR interval (ms) - corresponds to ~30 BPM min
                              # Values outside this range are marked as invalid (not removed)
      save_all: true          # Save all RR intervals, including invalid ones (marked with is_valid=0)
    
    metrics:
      extract_all: false
      min_duration_frequency_domain: 120  # seconds - minimum epoch duration for frequency-domain HRV (Task Force 1996)
      selected_metrics:
        # Essential Set - Time Domain (5 metrics)
        time_domain:
          - "HRV_MeanNN"     # Average heart rate
          - "HRV_SDNN"       # Overall HRV
          - "HRV_RMSSD"      # Parasympathetic activity
          - "HRV_pNN50"      # Parasympathetic activity
          - "HRV_CVNN"       # Normalized variability
        # Essential Set - Frequency Domain (4 metrics)  
        frequency_domain:
          - "HRV_LF"         # Sympathetic + parasympathetic
          - "HRV_HF"         # Parasympathetic (RSA)
          - "HRV_LFHF"       # Autonomic balance
          - "HRV_TP"         # Total power
        # Essential Set - Non-Linear (3 metrics)
        nonlinear:
          - "HRV_SD1"        # Short-term variability
          - "HRV_SD2"        # Long-term variability
          - "HRV_SampEn"     # Signal complexity
      # Future: Epoched analysis configuration
      epoched_analysis:
        enabled: false       # For future Sprint implementation
        window_size: 30      # seconds
        step_size: 1         # seconds
  
  # EDA (Electrodermal Activity) processing
  eda:
    sampling_rate: 4  # Hz, from Empatica E4
    processing:
      method: "neurokit"  # EDA processing method (neurokit default)
      method_scr: "neurokit"  # SCR peak detection method
      lowcut_freq: 0.05   # Hz - high-pass filter for baseline drift
      highcut_freq: 1.0   # Hz - low-pass filter for noise
      scr_threshold: 0.01  # Minimum SCR amplitude (μS)
      scr_min_amplitude: 0.01  # Minimum amplitude for valid SCR (μS)
      min_duration: 5          # seconds - minimum signal duration for decomposition
      quality_window: 4        # seconds - sliding window size for quality calculation
    metrics:
      extract_all: false
      selected_metrics:
        # SCR (Skin Conductance Response) metrics
        scr:
          - "SCR_Peaks_N"        # Number of SCR peaks
          - "SCR_Peaks_Amplitude_Mean"  # Mean SCR amplitude
          - "SCR_Peaks_Amplitude_Max"   # Maximum SCR amplitude
          - "SCR_RiseTime_Mean"   # Mean rise time (seconds)
          - "SCR_RecoveryTime_Mean"  # Mean recovery time (seconds)
        # Tonic/Phasic components
        components:
          - "EDA_Tonic_Mean"     # Mean tonic level (μS)
          - "EDA_Tonic_SD"       # Tonic level variability
          - "EDA_Phasic_Mean"    # Mean phasic activity
          - "EDA_Phasic_SD"      # Phasic variability
          - "EDA_Phasic_Rate"    # Rate of phasic responses (per minute)
        min_peaks_per_epoch: 20  # minimum beats for valid HRV

  # HR (Heart Rate) processing
  hr:
    sampling_rate: 1  # Hz, from Empatica E4 (1 sample/second)
    source: "bvp"  # Derived from BVP signal
    processing:
      method: "neurokit"  # Method to be selected during decision phase (e.g., template_matching)
      outlier_threshold: [40, 180]  # BPM - physiological HR range
      interpolation_max_gap: 5      # seconds - max gap to interpolate
      quality_min_samples: 30       # minimum samples for valid processing
      parameters:
        # Parameters will be added after method selection
    metrics:
      # Metrics list will be populated after decision phase
      extract_all: false
      selected_metrics: []
  
  # TEMP (Peripheral Skin Temperature) processing
  temp:
    sampling_rate: 4  # Hz, from Empatica E4
    processing:
      # Outlier thresholds (physiological limits for peripheral skin temperature)
      outlier_threshold: [25, 40]  # °C - values outside this range are marked as outliers
      # Artifact detection (sudden jumps indicate sensor issues)
      jump_threshold: 2.0  # °C - max expected change between consecutive samples (0.25s apart)
      # Interpolation settings
      interpolation_max_gap: 10  # seconds - max gap to interpolate
      # Quality settings
      quality_min_samples: 30  # minimum samples for valid processing
    metrics:
      extract_all: false
      selected_metrics:
        # Descriptive statistics
        descriptive:
          - "temp_mean"     # Mean temperature
          - "temp_std"      # Standard deviation
          - "temp_min"      # Minimum temperature
          - "temp_max"      # Maximum temperature
          - "temp_range"    # Range (max - min)
          - "temp_median"   # Median temperature
          - "temp_iqr"      # Interquartile range
        # Trend analysis (temperature changes reflect autonomic activity)
        trend:
          - "temp_slope"            # Linear trend slope (°C/s)
          - "temp_slope_per_minute" # Linear trend (°C/min) - more interpretable
          - "temp_initial"          # Initial temperature
          - "temp_final"            # Final temperature
          - "temp_change"           # Overall change (final - initial)
        # Stability metrics
        stability:
          - "temp_stability"  # Stability index (0-1)
          - "temp_cv"         # Coefficient of variation

# BIDS output configuration
bids:
  # Naming conventions following BIDS specification
  subject_prefix: "sub-"
  session_prefix: "ses-"
  task_prefix: "task-"
  
  # Metadata that will be included in JSON sidecars
  metadata:
    include_acquisition_time: true
    include_sampling_rate: true
    include_processing_parameters: true
    include_quality_metrics: true

# Processing options
processing:
  # Parallel processing
  n_jobs: 1  # Number of parallel jobs (-1 for all cores)
  
  # Quality control
  quality_check: true
  min_signal_duration: 30  # seconds, minimum duration for valid processing
  
  # Output options
  save_intermediate: false  # Save intermediate processing steps
  save_plots: true         # Save diagnostic plots

# Batch processing configuration
batch:
  # Timeout for each preprocessing script (seconds)
  timeout: 600  # 10 minutes per modality
  
  # Continue processing if one subject/session fails
  continue_on_error: true
  
  # Skip subjects that already have output files
  skip_existing: false
  
  # Validate duration consistency between modalities after preprocessing
  validate_durations: true
  duration_tolerance: 5.0  # seconds - max difference allowed between modalities
  
# Statistical analysis configuration
statistics:
  multiple_comparison_correction: "fdr_bh"  # Method for p-value correction (bonferroni, holm, fdr_bh)
  min_poincare_pairs: 20  # Minimum Poincaré pairs for reliable metrics

# Logging configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_rotation: true
  max_file_size: "10MB"
  backup_count: 5

# Epoching configuration
# Used to segment physiological signals into time windows for analysis
epoching:
  enabled: true
  
  # Processing mode
  # Options:
  #   - "preprocessing": Add epoch columns during preprocessing (recommended - no data duplication)
  #   - "separate": Create separate epoched files in derivatives/epoched/ (legacy mode)
  mode: "preprocessing"  # "preprocessing" or "separate"
  
  # Epoching methods
  # Each method can have different parameters per moment (task)
  methods:
    # Method 1: Fixed window with overlap
    # Creates epochs of fixed duration with specified overlap
    # Example: duration=30s, overlap=5s → epochs every 25s (step=duration-overlap)
    fixed:
      enabled: true
      restingstate:
        duration: 30        # seconds - epoch duration
        overlap: 5          # seconds - overlap between consecutive epochs
        min_duration_ratio: 0.0  # Keep all partial epochs (0.0=all, 1.0=only complete)
      therapy:
        duration: 30        # seconds - epoch duration
        overlap: 5          # seconds - overlap between consecutive epochs
        min_duration_ratio: 0.0  # Keep all partial epochs (0.0=all, 1.0=only complete)
    
    # Method 2: N-split
    # Divides signal into exactly N epochs of equal duration
    # Useful for epoch shuffling (ensures same number of epochs per session)
    nsplit:
      enabled: true
      restingstate:
        n_epochs: 1         # Single epoch for resting state baseline
      therapy:
        n_epochs: 120       # Number of epochs (~30s each for 1h sessions)
    
    # Method 3: Sliding window
    # Creates overlapping epochs with small step size
    # Useful for Dyadic Poincaré Plot Analysis (DPPA)
    sliding:
      enabled: true
      restingstate:
        duration: 30        # seconds - epoch duration
        step: 5             # seconds - step between consecutive epochs
        min_duration_ratio: 0.0  # Keep all partial epochs
      therapy:
        duration: 30        # seconds - epoch duration
        step: 5             # seconds - step between consecutive epochs
        min_duration_ratio: 0.0  # Keep all partial epochs

# Visualization Configuration
visualization:
  # DPPA (Dyadic Poincaré Plot Analysis) visualization settings
  dppa:
    # Figure settings
    figure:
      width: 12           # inches
      height: 8           # inches
      dpi: 150            # resolution for PNG output
      format: "png"       # output format (png, pdf, svg)
    
    # Color scheme
    colors:
      subject1: "#1f77b4"       # Blue for first subject
      subject2: "#ff7f0e"       # Orange for second subject
      therapy: "#d62728"        # Red for therapy data
      resting: "#2ca02c"        # Green for resting baseline
      trendline: "#000000"      # Black for trendline
    
    # Line styles
    styles:
      therapy_linewidth: 1.5
      baseline_linewidth: 1.0
      baseline_linestyle: "--"  # dashed
      trendline_linewidth: 1.0
      trendline_linestyle: "--"  # dashed
    
    # Labels and titles
    labels:
      icd: "Inter-Centroid Distance (ms)"
      sd1: "SD1 (ms)"
      sd2: "SD2 (ms)"
      ratio: "SD1/SD2 Ratio"
      epoch: "Epoch ID"
    
    # Y-axis limits for normalized visualization
    ylimits:
      icd: 1000           # Maximum ICD value (ms)
      sd1: 600            # Maximum SD1 value (ms)
      sd2: 600            # Maximum SD2 value (ms)
      ratio: 3.0          # Maximum SD1/SD2 ratio
    
    # Output directory
    output:
      base_dir: "dppa/figures"  # derivatives/dppa/figures/
      # Filename pattern: sub-{sub1}_ses-{ses1}_vs_sub-{sub2}_ses-{ses2}_method-{method}_desc-dyad_viz.png
